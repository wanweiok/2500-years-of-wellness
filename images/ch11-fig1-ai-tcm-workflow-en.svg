<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2d3"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d2d3"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold">AI Wellness Workflow</text>
  
  <!-- Left: User Inputs -->
  <g id="inputs">
    <rect x="40" y="70" width="140" height="180" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="95" text-anchor="middle" fill="#00d2d3" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">User Inputs</text>
    <rect x="55" y="110" width="110" height="28" rx="4" fill="#0f3460"/>
    <text x="110" y="128" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Constitution</text>
    <rect x="55" y="145" width="110" height="28" rx="4" fill="#0f3460"/>
    <text x="110" y="163" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Symptoms</text>
    <rect x="55" y="180" width="110" height="28" rx="4" fill="#0f3460"/>
    <text x="110" y="198" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Lifestyle</text>
    <rect x="55" y="215" width="110" height="28" rx="4" fill="#0f3460"/>
    <text x="110" y="233" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Health Data</text>
  </g>
  
  <!-- Arrows from inputs to center -->
  <path d="M 185 160 L 275 160" stroke="#00d2d3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 185 187 L 275 187" stroke="#00d2d3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 185 222 L 275 222" stroke="#00d2d3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 185 249 L 275 249" stroke="#00d2d3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Center: AI Processing -->
  <g id="ai-core">
    <rect x="280" y="120" width="240" height="180" rx="10" fill="url(#aiGrad)" stroke="#00d2d3" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="155" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold">Large Language Model</text>
    <rect x="305" y="175" width="190" height="40" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="400" y="198" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Pattern Analysis ’ Personalized Protocol</text>
  </g>
  
  <!-- Arrows from center to outputs -->
  <path d="M 525 160 L 615 160" stroke="#00d2d3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 525 187 L 615 187" stroke="#00d2d3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 525 222 L 615 222" stroke="#00d2d3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 525 249 L 615 249" stroke="#00d2d3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Right: Outputs -->
  <g id="outputs">
    <rect x="620" y="70" width="140" height="180" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2" filter="url(#shadow)"/>
    <text x="690" y="95" text-anchor="middle" fill="#00d2d3" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">Outputs</text>
    <rect x="635" y="110" width="110" height="28" rx="4" fill="#0f3460"/>
    <text x="690" y="128" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Wellness Advice</text>
    <rect x="635" y="145" width="110" height="28" rx="4" fill="#0f3460"/>
    <text x="690" y="163" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Diet Plan</text>
    <rect x="635" y="180" width="110" height="28" rx="4" fill="#0f3460"/>
    <text x="690" y="198" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Exercise Rx</text>
    <rect x="635" y="215" width="110" height="28" rx="4" fill="#0f3460"/>
    <text x="690" y="233" text-anchor="middle" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Emotional Care</text>
  </g>
  
  <!-- Bottom feedback loop -->
  <path d="M 690 270 L 690 340 L 110 340 L 110 300" stroke="#00d2d3" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <path d="M 110 300 L 110 300 L 280 300" stroke="#00d2d3" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <polygon points="275,295 285,300 275,305" fill="#00d2d3"/>
  <rect x="280" y="350" width="240" height="35" rx="6" fill="#16213e" stroke="#00d2d3" stroke-width="1"/>
  <text x="400" y="372" text-anchor="middle" fill="#00d2d3" font-family="Segoe UI, Arial, sans-serif" font-size="13">Weekly Journal ’ Trend Analysis ’ Protocol Optimization</text>
  
  <!-- Red warning box -->
  <rect x="500" y="400" width="260" height="70" rx="8" fill="#2d1b1b" stroke="#e94560" stroke-width="2"/>
  <text x="630" y="430" text-anchor="middle" fill="#e94560" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">  Red Line: Emergencies ’ See a Doctor Immediately</text>
  <text x="630" y="452" text-anchor="middle" fill="#cccccc" font-family="Segoe UI, Arial, sans-serif" font-size="11">AI wellness is for reference only; not a substitute for medical care</text>
</svg>
