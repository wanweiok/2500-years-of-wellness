  <path d="M 275 572 L 430 608" stroke="#5b9bd5" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 585 572 L 430 608" stroke="#5b9bd5" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

