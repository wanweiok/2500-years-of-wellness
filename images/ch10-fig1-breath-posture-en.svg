<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1"/>
    </linearGradient>
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#e8e8e8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">Breath &amp; Posture: The Daily Regulation System</text>

  <!-- Connector lines from center to nodes -->
  <line x1="400" y1="220" x2="400" y2="140" stroke="#e94560" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="400" y1="220" x2="505" y2="165" stroke="#e94560" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="400" y1="220" x2="505" y2="295" stroke="#e94560" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="400" y1="220" x2="400" y2="300" stroke="#e94560" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="400" y1="220" x2="295" y2="295" stroke="#e94560" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="400" y1="220" x2="295" y2="165" stroke="#e94560" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Central circle: Breath Regulation -->
  <circle cx="400" cy="220" r="52" fill="url(#centerGrad)" stroke="#e94560" stroke-width="2" filter="url(#nodeShadow)"/>
  <text x="400" y="216" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">Breath</text>
  <text x="400" y="233" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">Regulation</text>

  <!-- Node 1: Diaphragmatic Breathing (top) -->
  <rect x="285" y="72" width="230" height="56" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2" filter="url(#nodeShadow)"/>
  <text x="400" y="94" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">Diaphragmatic Breathing</text>
  <text x="400" y="116" text-anchor="middle" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="11">Cortisol &#8595; HRV &#8593;</text>

  <!-- Node 2: Six Healing Sounds (top-right) -->
  <rect x="460" y="132" width="190" height="56" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2" filter="url(#nodeShadow)"/>
  <text x="555" y="154" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">Six Healing Sounds</text>
  <text x="555" y="176" text-anchor="middle" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="11">X&#363; H&#275; H&#363; S&#299; Chu&#299; X&#299;</text>

  <!-- Node 3: Walking (bottom-right) -->
  <rect x="460" y="262" width="190" height="56" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2" filter="url(#nodeShadow)"/>
  <text x="555" y="284" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">Walking</text>
  <text x="555" y="306" text-anchor="middle" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="11">Walk Broadly &#183; Mindful Walking</text>

  <!-- Node 4: Sitting (bottom center) -->
  <rect x="285" y="332" width="230" height="56" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2" filter="url(#nodeShadow)"/>
  <text x="400" y="354" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">Sitting</text>
  <text x="400" y="376" text-anchor="middle" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="11">Break Every 30 min</text>

  <!-- Node 5: Sleep Posture (bottom-left) -->
  <rect x="150" y="262" width="190" height="56" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2" filter="url(#nodeShadow)"/>
  <text x="245" y="284" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">Sleep Posture</text>
  <text x="245" y="306" text-anchor="middle" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="11">Lateral &#183; 4-7-8 Breathing</text>

  <!-- Node 6: Standing Meditation (top-left) -->
  <rect x="150" y="132" width="190" height="56" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2" filter="url(#nodeShadow)"/>
  <text x="245" y="154" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">Standing Meditation</text>
  <text x="245" y="176" text-anchor="middle" fill="#b0b0b0" font-family="Arial, Helvetica, sans-serif" font-size="11">Isometric &#183; Proprioception</text>

  <!-- Bottom quote -->
  <rect x="40" y="430" width="720" height="2" fill="#e94560" opacity="0.4"/>
  <text x="400" y="475" text-anchor="middle" fill="#c0c0c0" font-family="Georgia, serif" font-size="16" font-style="italic">&quot;Heaven&apos;s qi connects to the Lung&quot;</text>
  <text x="400" y="500" text-anchor="middle" fill="#808080" font-family="Arial, Helvetica, sans-serif" font-size="11">&#8212; Su Wen &#183; Yin Yang Ying Xiang Da Lun</text>
</svg>
