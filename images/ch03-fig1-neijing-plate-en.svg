<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" width="860" height="620">
  <defs>
    <style>
      text { font-family: Arial, "Helvetica Neue", sans-serif; }
    </style>
  </defs>

  <rect width="860" height="620" fill="#f8f9fa" rx="6"/>

  <text x="430" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a3a5c">The Neijing Plate</text>
  <text x="430" y="66" text-anchor="middle" font-size="13" fill="#666">Dietary structure based on Su Wen, Chapter 22</text>

  <circle cx="430" cy="310" r="210" fill="none" stroke="#1a3a5c" stroke-width="3" opacity="0.15"/>

  <!-- Grains 37.5% -->
  <path d="M 430 310 L 430 100 A 200 200 0 0 1 571.4 441.4 Z" fill="#5b9bd5" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Vegetables 32.5% -->
  <path d="M 430 310 L 571.4 441.4 A 200 200 0 0 1 239.8 361.8 Z" fill="#4a9a5a" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Fruits 12.5% -->
  <path d="M 430 310 L 239.8 361.8 A 200 200 0 0 1 251.8 209.2 Z" fill="#e8a849" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Meat/Eggs 17.5% -->
  <path d="M 430 310 L 251.8 209.2 A 200 200 0 0 1 430 100 Z" fill="#2d5a88" stroke="#ffffff" stroke-width="2.5"/>

  <!-- Center circle -->
  <circle cx="430" cy="310" r="62" fill="#1a3a5c" stroke="#ffffff" stroke-width="3"/>
  <text x="430" y="302" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Five-Flavor</text>
  <text x="430" y="320" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Harmony</text>

  <!-- Grains label (upper-right area) -->
  <text x="555" y="228" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">&#x1F33E; Grains</text>
  <text x="555" y="248" text-anchor="middle" font-size="13" fill="#ffffff">Foundation &#xB7; 35&#x2013;40%</text>
  <text x="555" y="268" text-anchor="middle" font-size="12" fill="#dce8f5">Brown rice &#xB7; Millet &#xB7; Oats</text>

  <!-- Vegetables label (lower area) -->
  <text x="440" y="434" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">&#x1F96C; Vegetables</text>
  <text x="440" y="454" text-anchor="middle" font-size="13" fill="#ffffff">Fillers &#xB7; 30&#x2013;35%</text>
  <text x="440" y="474" text-anchor="middle" font-size="12" fill="#d4edda">Dark greens &#xB7; Seasonal</text>

  <!-- Fruits label (left area, compact) -->
  <text x="268" y="296" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">&#x1F34E; Fruits</text>
  <text x="268" y="316" text-anchor="middle" font-size="12" fill="#fff5e0">Helpers &#xB7; 10&#x2013;15%</text>

  <!-- Meat label (upper-left area) -->
  <text x="340" y="186" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">&#x1F969; Protein</text>
  <text x="340" y="206" text-anchor="middle" font-size="12" fill="#c8daf0">Supplement &#xB7; 15&#x2013;20%</text>

  <!-- Bottom guidance -->
  <rect x="160" y="548" width="540" height="42" rx="6" fill="#1a3a5c" opacity="0.08"/>
  <text x="430" y="568" text-anchor="middle" font-size="14" fill="#1a3a5c" font-weight="bold">Eat to 70% full &#xB7; Chew slowly &#xB7; Eat with a calm mind</text>
  <text x="430" y="586" text-anchor="middle" font-size="12" fill="#666">Cover &#x2265; 3 flavors per meal</text>
</svg>
