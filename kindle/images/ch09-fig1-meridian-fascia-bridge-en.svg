<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#5b9bd5"/>
    </marker>
    <marker id="arrGold" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#c9a84c"/>
    </marker>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#5b9bd5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d7a4a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="860" height="560" fill="#f0f0f0" rx="10"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#1a3a5c" font-family="Arial, sans-serif" font-size="16" font-weight="bold">The MeridianFascia Bridge: Ancient Meets Modern</text>

  <!-- LEFT COLUMN: Classical Meridians -->
  <rect x="30" y="56" width="240" height="36" rx="5" fill="#1a3a5c"/>
  <text x="150" y="80" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Classical Meridians (Ling Shu)</text>

  <rect x="40" y="106" width="220" height="40" rx="4" fill="#2d5a88"/>
  <text x="150" y="122" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Bladder Meridian</text>
  <text x="150" y="138" text-anchor="middle" fill="#b8d4e8" font-family="Arial, sans-serif" font-size="10">Sole  spine  crown of head</text>

  <rect x="40" y="156" width="220" height="40" rx="4" fill="#2d5a88"/>
  <text x="150" y="172" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Stomach Meridian</text>
  <text x="150" y="188" text-anchor="middle" fill="#b8d4e8" font-family="Arial, sans-serif" font-size="10">Face  chest  anterior leg</text>

  <rect x="40" y="206" width="220" height="40" rx="4" fill="#2d5a88"/>
  <text x="150" y="222" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Gallbladder Meridian</text>
  <text x="150" y="238" text-anchor="middle" fill="#b8d4e8" font-family="Arial, sans-serif" font-size="10">Side of head  lateral trunk  leg</text>

  <rect x="40" y="256" width="220" height="40" rx="4" fill="#2d5a88"/>
  <text x="150" y="272" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Kidney Meridian</text>
  <text x="150" y="288" text-anchor="middle" fill="#b8d4e8" font-family="Arial, sans-serif" font-size="10">Sole  inner leg  deep abdomen</text>

  <!-- CENTER COLUMN: Fascia Bridge -->
  <rect x="310" y="56" width="240" height="36" rx="5" fill="url(#bridgeGrad)"/>
  <text x="430" y="80" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Fascial Bridge (21st Century)</text>

  <rect x="320" y="106" width="220" height="40" rx="4" fill="#3d7a55" opacity="0.9"/>
  <text x="430" y="122" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Superficial Back Line</text>
  <text x="430" y="138" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="10">Myers: Anatomy Trains</text>

  <rect x="320" y="156" width="220" height="40" rx="4" fill="#3d7a55" opacity="0.9"/>
  <text x="430" y="172" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Superficial Front Line</text>
  <text x="430" y="188" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="10">Myers: Anatomy Trains</text>

  <rect x="320" y="206" width="220" height="40" rx="4" fill="#3d7a55" opacity="0.9"/>
  <text x="430" y="222" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Lateral Line</text>
  <text x="430" y="238" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="10">Myers: Anatomy Trains</text>

  <rect x="320" y="256" width="220" height="40" rx="4" fill="#3d7a55" opacity="0.9"/>
  <text x="430" y="272" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Deep Front Line</text>
  <text x="430" y="288" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="10">Myers: Anatomy Trains</text>

  <!-- RIGHT COLUMN: Modern Mechanisms -->
  <rect x="590" y="56" width="240" height="36" rx="5" fill="#2d7a4a"/>
  <text x="710" y="80" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Modern Mechanisms</text>

  <rect x="600" y="106" width="220" height="40" rx="4" fill="#3a6b50"/>
  <text x="710" y="122" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Mechanotransduction</text>
  <text x="710" y="138" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="10">Langevin: needle  collagen  signal</text>

  <rect x="600" y="156" width="220" height="40" rx="4" fill="#3a6b50"/>
  <text x="710" y="172" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Fascial Sensory Organ</text>
  <text x="710" y="188" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="10">Schleip: dense mechanoreceptors</text>

  <rect x="600" y="206" width="220" height="40" rx="4" fill="#3a6b50"/>
  <text x="710" y="222" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Piezoelectricity</text>
  <text x="710" y="238" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="10">Fukada: collagen bioelectricity</text>

  <rect x="600" y="256" width="220" height="40" rx="4" fill="#3a6b50"/>
  <text x="710" y="272" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Adenosine Release</text>
  <text x="710" y="288" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="10">Goldman: local analgesic effect</text>

  <!-- Arrows: Left  Center -->
  <line x1="260" y1="126" x2="318" y2="126" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="176" x2="318" y2="176" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="226" x2="318" y2="226" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="276" x2="318" y2="276" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrows: Center  Right -->
  <line x1="540" y1="126" x2="598" y2="126" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="176" x2="598" y2="176" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="226" x2="598" y2="226" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="276" x2="598" y2="276" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Correspondence labels -->
  <text x="290" y="118" text-anchor="middle" fill="#c9a84c" font-family="Arial, sans-serif" font-size="9" font-weight="bold">H</text>
  <text x="290" y="168" text-anchor="middle" fill="#c9a84c" font-family="Arial, sans-serif" font-size="9" font-weight="bold">H</text>
  <text x="290" y="218" text-anchor="middle" fill="#c9a84c" font-family="Arial, sans-serif" font-size="9" font-weight="bold">H</text>
  <text x="290" y="268" text-anchor="middle" fill="#c9a84c" font-family="Arial, sans-serif" font-size="9" font-weight="bold">H</text>

  <!-- Bottom section: Mechanotransduction pathway -->
  <rect x="40" y="320" width="780" height="4" rx="2" fill="#5b9bd5" opacity="0.4"/>

  <text x="430" y="350" text-anchor="middle" fill="#1a3a5c" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Acupoint  Fascia: The Mechanotransduction Pathway</text>

  <rect x="50" y="370" width="130" height="50" rx="6" fill="#1a3a5c"/>
  <text x="115" y="392" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Needle / Press</text>
  <text x="115" y="408" text-anchor="middle" fill="#b8d4e8" font-family="Arial, sans-serif" font-size="9">Mechanical stimulus</text>

  <line x1="180" y1="395" x2="218" y2="395" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrGold)"/>

  <rect x="220" y="370" width="130" height="50" rx="6" fill="#2d5a88"/>
  <text x="285" y="392" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Collagen Winding</text>
  <text x="285" y="408" text-anchor="middle" fill="#b8d4e8" font-family="Arial, sans-serif" font-size="9">Tissue deformation</text>

  <line x1="350" y1="395" x2="388" y2="395" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrGold)"/>

  <rect x="390" y="370" width="130" height="50" rx="6" fill="#3d7a55"/>
  <text x="455" y="392" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Fibroblast Response</text>
  <text x="455" y="408" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="9">ATP / adenosine release</text>

  <line x1="520" y1="395" x2="558" y2="395" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrGold)"/>

  <rect x="560" y="370" width="130" height="50" rx="6" fill="#3a6b50"/>
  <text x="625" y="392" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Signal Cascade</text>
  <text x="625" y="408" text-anchor="middle" fill="#c5e8d0" font-family="Arial, sans-serif" font-size="9">Anti-inflammatory / analgesic</text>

  <line x1="690" y1="395" x2="728" y2="395" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrGold)"/>

  <rect x="730" y="370" width="90" height="50" rx="6" fill="#1a3a5c" stroke="#c9a84c" stroke-width="2"/>
  <text x="775" y="392" text-anchor="middle" fill="#c9a84c" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Outcome</text>
  <text x="775" y="408" text-anchor="middle" fill="#b8d4e8" font-family="Arial, sans-serif" font-size="9"> Evidence-based</text>

  <!-- Evidence legend -->
  <rect x="50" y="445" width="370" height="100" rx="6" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="466" fill="#1a3a5c" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Evidence Levels</text>
  <circle cx="75" cy="484" r="6" fill="#2d7a4a"/>
  <text x="90" y="489" fill="#333" font-family="Arial, sans-serif" font-size="11"> Confirmed: Point-fascia mapping | Mechanotransduction</text>
  <circle cx="75" cy="506" r="6" fill="#c9a84c"/>
  <text x="90" y="511" fill="#333" font-family="Arial, sans-serif" font-size="11">? Plausible: Meridian-fascial line mapping | Bioelectricity</text>
  <circle cx="75" cy="528" r="6" fill="#cc4444"/>
  <text x="90" y="533" fill="#333" font-family="Arial, sans-serif" font-size="11"> Disproven: Physical "meridian tubes" as anatomical entity</text>

  <!-- Source note -->
  <rect x="450" y="445" width="370" height="100" rx="6" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <text x="465" y="466" fill="#1a3a5c" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Key Studies</text>
  <text x="465" y="486" fill="#555" font-family="Arial, sans-serif" font-size="10">Langevin &amp; Yandow 2002  Acupointfascia correspondence</text>
  <text x="465" y="502" fill="#555" font-family="Arial, sans-serif" font-size="10">Myers 2001  Anatomy Trains (myofascial meridians)</text>
  <text x="465" y="518" fill="#555" font-family="Arial, sans-serif" font-size="10">Schleip 2003  Fascia as sensory organ</text>
  <text x="465" y="534" fill="#555" font-family="Arial, sans-serif" font-size="10">Vickers 2018  Acupuncture pain meta-analysis (20,000+ pts)</text>
</svg>
