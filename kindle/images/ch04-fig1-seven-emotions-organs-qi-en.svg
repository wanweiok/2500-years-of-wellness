<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 510" width="860" height="510">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d5a88"/>
    </marker>
  </defs>

  <rect width="860" height="510" fill="#ffffff" rx="8" stroke="#e0e0e0" stroke-width="1"/>

  <text x="430" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a3a5c">Figure 4-1: Seven Emotions &#x2192; Organ &#x2192; Qi Movement</text>

  <!-- Emotions (left column) -->
  <rect x="30" y="55" width="210" height="44" rx="6" fill="#5b9bd5"/>
  <text x="135" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Anger</text>

  <rect x="30" y="118" width="210" height="44" rx="6" fill="#5b9bd5"/>
  <text x="135" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Joy (excess)</text>

  <rect x="30" y="181" width="210" height="44" rx="6" fill="#5b9bd5"/>
  <text x="135" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Fright</text>

  <rect x="30" y="244" width="210" height="44" rx="6" fill="#5b9bd5"/>
  <text x="135" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Pensiveness</text>

  <rect x="30" y="307" width="210" height="44" rx="6" fill="#5b9bd5"/>
  <text x="135" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Worry</text>

  <rect x="30" y="370" width="210" height="44" rx="6" fill="#5b9bd5"/>
  <text x="135" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Grief</text>

  <rect x="30" y="433" width="210" height="44" rx="6" fill="#5b9bd5"/>
  <text x="135" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Fear</text>

  <!-- Organs (right column) -->
  <rect x="620" y="55" width="210" height="44" rx="6" fill="#1a3a5c"/>
  <text x="725" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Liver</text>

  <rect x="620" y="149" width="210" height="44" rx="6" fill="#1a3a5c"/>
  <text x="725" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Heart</text>

  <rect x="620" y="275" width="210" height="44" rx="6" fill="#1a3a5c"/>
  <text x="725" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Spleen</text>

  <rect x="620" y="370" width="210" height="44" rx="6" fill="#1a3a5c"/>
  <text x="725" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Lung</text>

  <rect x="620" y="433" width="210" height="44" rx="6" fill="#1a3a5c"/>
  <text x="725" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Kidney</text>

  <!-- Anger ? Liver -->
  <line x1="240" y1="77" x2="618" y2="77" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="375" y="63" width="100" height="24" rx="4" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="425" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Qi rises</text>

  <!-- Joy ? Heart -->
  <line x1="240" y1="140" x2="618" y2="165" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="375" y="135" width="100" height="24" rx="4" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="425" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Qi slackens</text>

  <!-- Fright ? Heart -->
  <line x1="240" y1="203" x2="618" y2="177" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="375" y="180" width="100" height="24" rx="4" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="425" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Qi scatters</text>

  <!-- Pensiveness ? Spleen -->
  <line x1="240" y1="266" x2="618" y2="291" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="375" y="264" width="100" height="24" rx="4" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="425" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Qi knots</text>

  <!-- Worry ? Spleen -->
  <line x1="240" y1="329" x2="618" y2="303" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="375" y="307" width="100" height="24" rx="4" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="425" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Qi stagnates</text>

  <!-- Grief ? Lung -->
  <line x1="240" y1="392" x2="618" y2="392" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="375" y="378" width="100" height="24" rx="4" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="425" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Qi dissolves</text>

  <!-- Fear ? Kidney -->
  <line x1="240" y1="455" x2="618" y2="455" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="375" y="441" width="100" height="24" rx="4" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="425" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Qi descends</text>
</svg>
